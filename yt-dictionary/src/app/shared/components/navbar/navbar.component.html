<nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">

      <a routerLink="/" class="flex items-center gap-2 text-xl font-bold text-indigo-700">
        <span class="text-2xl">📖</span>
        YT Dictionary
      </a>

      <div class="flex items-center gap-1">
        <a routerLink="/dictionary"
           routerLinkActive="text-indigo-700 font-semibold"
           class="px-3 py-2 rounded-md text-sm text-gray-600 hover:text-indigo-700 hover:bg-indigo-50 transition-colors">
          Dictionary
        </a>

        @if (auth.isAuthenticated) {
          <a routerLink="/submit"
             routerLinkActive="text-indigo-700 font-semibold"
             class="px-3 py-2 rounded-md text-sm text-gray-600 hover:text-indigo-700 hover:bg-indigo-50 transition-colors">
            Submit Word
          </a>
        }

        @if (auth.hasRole(['approver', 'admin'])) {
          <a routerLink="/pending"
             routerLinkActive="text-indigo-700 font-semibold"
             class="px-3 py-2 rounded-md text-sm text-gray-600 hover:text-indigo-700 hover:bg-indigo-50 transition-colors">
            Pending
          </a>
        }

        @if (auth.hasRole(['admin'])) {
          <a routerLink="/admin"
             routerLinkActive="text-indigo-700 font-semibold"
             class="px-3 py-2 rounded-md text-sm text-gray-600 hover:text-indigo-700 hover:bg-indigo-50 transition-colors">
            Admin
          </a>
        }
      </div>

      <div class="flex items-center gap-2">
        @if (auth.isAuthenticated) {
          <span class="text-sm text-gray-500">
            {{ auth.currentUser()?.username }}
            <span class="ml-1 text-xs bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-full font-medium">
              {{ auth.role }}
            </span>
          </span>
          <button (click)="auth.signOut()"
                  class="text-sm text-gray-500 hover:text-red-600 px-3 py-2 rounded-md hover:bg-red-50 transition-colors">
            Sign Out
          </button>
        } @else {
          <a routerLink="/auth/login"
             class="text-sm text-gray-600 hover:text-indigo-700 px-3 py-2 rounded-md hover:bg-indigo-50 transition-colors">
            Log In
          </a>
          <a routerLink="/auth/register"
             class="text-sm bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700 transition-colors font-medium">
            Sign Up
          </a>
        }
      </div>

    </div>
  </div>
</nav>
